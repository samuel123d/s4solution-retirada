<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  query,
  where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {

  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listaTitulares =
document.getElementById("listaTitulares");

const form =
document.getElementById("formTitular");

const telefoneInput =
document.getElementById("telefone");

/* SEGURANÇA */
function limpar(texto){

  return texto
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

}

/* LISTAR TITULARES */
async function listarTitulares(){

  listaTitulares.innerHTML = "";

  const snap =
  await getDocs(collection(db,"titulares"));

  snap.forEach(docu=>{

    const t = docu.data();

    const li =
    document.createElement("li");

    li.className =
    "list-group-item mb-3";

    li.innerHTML = `

      <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">



        <div>

          <b>${limpar(t.nome)}</b><br>

          Bloco ${limpar(t.bloco)}
          • Casa ${limpar(t.casa)}<br>

          📞 ${limpar(t.telefone)}

        </div>

        <div class="d-flex gap-2 flex-wrap">

          <button class="btn btn-outline-primary btn-sm btnVer">
            Ver encomendas
          </button>

          <button class="btn btn-outline-danger btn-sm btnExcluirTitular">
            Excluir titular
          </button>

        </div>

      </div>

      <ul class="list-group mt-3 d-none"
      id="enc-${docu.id}"></ul>

    `;

    const btnVer =
    li.querySelector(".btnVer");

    const btnExcluirTitular =
    li.querySelector(".btnExcluirTitular");

    const listaEnc =
    li.querySelector(`#enc-${docu.id}`);

    /* EXCLUIR TITULAR */
    btnExcluirTitular.addEventListener("click", async()=>{

      const ok = confirm(
        `Excluir ${t.nome}?\n\nTodas as encomendas serão removidas.`
      );

      if(!ok) return;

      const q =
      query(
        collection(db,"encomendas"),
        where("titularId","==",docu.id)
      );

      const encomendas =
      await getDocs(q);

      for(const d of encomendas.docs){

        await deleteDoc(
          doc(db,"encomendas",d.id)
        );

      }

      await deleteDoc(
        doc(db,"titulares",docu.id)
      );

      listarTitulares();

    });

    /* VER ENCOMENDAS */
    btnVer.addEventListener("click", async()=>{


      if(!listaEnc.classList.contains("d-none")){

        listaEnc.classList.add("d-none");
        btnVer.textContent="Ver encomendas";
        return;

      }

      btnVer.disabled = true;
      btnVer.textContent = "Carregando...";

      listaEnc.classList.remove("d-none");


      const q =
      query(
        collection(db,"encomendas"),
        where("titularId","==",docu.id)
      );

      const encSnap =
      await getDocs(q);

      listaEnc.innerHTML = "";

      if(encSnap.empty){

        listaEnc.innerHTML = `
          <li class="list-group-item text-muted">
            Nenhuma encomenda
          </li>
        `;

        btnVer.disabled = false;
        btnVer.textContent = "Ocultar encomendas";

        return;

      }

      let html = "";

      encSnap.forEach(d=>{




        const e = d.data();

        const recebido =
        e.criadoEm
        ? e.criadoEm.toDate().toLocaleString()
        : "—";

        const retirado =
        e.retiradoEm
        ? e.retiradoEm.toDate().toLocaleString()
        : null;

        /* WHATSAPP */
        const mensagem = `Olá, ${t.nome}!
Sua encomenda de ${e.produto} foi registrada.
Código: ${e.codigo}`;

        const whatsapp =
        `https://wa.me/${t.telefone}?text=${encodeURIComponent(mensagem)}`;

        html += `

          <li class="list-group-item">

            <div class="d-flex flex-column flex-md-row gap-3">

              <img src="${e.foto}"
              class="encomenda-foto">

              <div class="flex-fill">

                <b>${limpar(e.produto)}</b><br>

                Número de Série:
                <strong>${e.serie || "—"}</strong><br>

                Recebido em:
                ${recebido}<br>

                Status:
                ${e.status}<br>

                ${
                  e.status==="Aguardando retirada"

                  ?

                  `
                  <input
                  class="form-control mt-2 codigoInput"
                  data-id="${d.id}"
                  data-codigo="${e.codigo}"
                  placeholder="Código">

                  <button
                  class="btn btn-success btn-sm mt-2 btnValidar"
                  data-id="${d.id}"
                  data-codigo="${e.codigo}">
                    Validar
                  </button>
                  `

                  :

                  `Retirado em: ${retirado}`

                }

                <div class="d-flex gap-2 flex-wrap mt-2">

                  <a href="${whatsapp}"
                  target="_blank"
                  class="btn btn-success btn-sm">
                    WhatsApp
                  </a>

                  <button
                  class="btn btn-danger btn-sm btnExcluirEnc"
                  data-id="${d.id}">
                    Excluir encomenda
                  </button>

                </div>

              </div>

            </div>

          </li>

        `;

      });

      listaEnc.innerHTML = html;

      /* VALIDAR */
      listaEnc
      .querySelectorAll(".btnValidar")
      .forEach(btn=>{

        btn.addEventListener("click", async()=>{

          const id =
          btn.dataset.id;

          const codigo =
          btn.dataset.codigo;

          const input =
          listaEnc.querySelector(
            `.codigoInput[data-id="${id}"]`
          );

          if(input.value !== codigo){

            alert("Código inválido");
            return;

          }

          await updateDoc(
            doc(db,"encomendas",id),
            {
              status:"Retirado",
              retiradoEm:new Date()
            }
          );

          listarTitulares();

        });

      });

      /* EXCLUIR ENCOMENDA */
      listaEnc
      .querySelectorAll(".btnExcluirEnc")
      .forEach(btn=>{

        btn.addEventListener("click", async()=>{

          const id =
          btn.dataset.id;

          const ok =
          confirm("Excluir encomenda?");

          if(!ok) return;

          await deleteDoc(
            doc(db,"encomendas",id)
          );

          listarTitulares();

        });

      });

      btnVer.disabled = false;
      btnVer.textContent = "Ocultar encomendas";

    });

    listaTitulares.appendChild(li);

  });

}
